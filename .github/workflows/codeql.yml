name: "CodeQL Security Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 18 * * 4'

jobs:
  analyze:
    name: Analyze C++ Code
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: cpp

    - name: Compile Core Engine and CLI
      run: |
        g++ -shared -fPIC -I./include src/elf_parser.cpp src/tracer.cpp -o libzeroshadow.so
        g++ -I./include src/main.cpp -L. -lzeroshadow -o ZeroShadow

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:cpp"
